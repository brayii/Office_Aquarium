name: Office Aquarium CI

on:
  push:
  pull_request:

jobs:
  release-suite:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: JavaScript syntax check
        shell: pwsh
        run: |
          Get-ChildItem -Path src,tests,tools -Recurse -Filter *.js | ForEach-Object {
            node --check $_.FullName
          }

      - name: Complete release regression suite
        run: npm test

      - name: Clean web package and launch smoke
        run: npm run test:package-web

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Tauri Rust check
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

      - name: Verify generated third-party notices
        shell: pwsh
        run: |
          npm run generate:notices
          git diff --exit-code -- THIRD_PARTY_NOTICES.md

      - name: Upload tested web package
        uses: actions/upload-artifact@v4
        with:
          name: office-aquarium-web-${{ github.sha }}
          path: |
            dist/Office_Aquarium_Public_Beta_0.9_itch_web.zip
            dist/Office_Aquarium_Public_Beta_0.9_itch_web.zip.sha256
          if-no-files-found: error
